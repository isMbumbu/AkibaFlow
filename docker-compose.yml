services:
  # --------------------
  # 1. API Service (FastAPI)
  # --------------------
  api:
    build: .
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    # This command uses hot-reload for development, read from docker-compose.override.yml if present
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # --------------------
  # 2. Database Service (PostgreSQL)
  # --------------------
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # HOST:CONTAINER
      # Changed from "5432:5432" to avoid "address already in use" error 
      - "5433:5432" 

volumes:
  postgres_data: