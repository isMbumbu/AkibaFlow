
services:
  # --------------------
  # 1. API Service (FastAPI)
  # --------------------
  api:
    build: .
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    # NOTE: The command here is overridden by docker-compose.override.yml in dev mode!
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload 

  # --------------------
  # 2. Database Service (PostgreSQL)
  # --------------------
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # HOST PORT CHANGED to 5433 to resolve 'address already in use' error.
      # The API service still connects to 'db:5432'.
      - "5433:5432" 

volumes:
  postgres_data: